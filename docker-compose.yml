services:
  mongo:
    image: mongo:6
    container_name: smartinventory-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./WarehouseDevOps
      dockerfile: Dockerfile
    container_name: smartinventory-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smartinventory
      SECRET_OR_KEY: dev-secret
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    volumes:
      - ./WarehouseDevOps:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run server"

  frontend:
    build:
      context: ./WarehouseDevOps/client
      dockerfile: Dockerfile
    container_name: smartinventory-frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CI: "true"
      SKIP_PREFLIGHT_CHECK: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./WarehouseDevOps/client:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm start"

volumes:
  mongo_data:
